<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <meta charset="UTF-8">
  <title>授業記録編集</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; background: #f5f7fa; }
    h1 { color: #2c3e50; }
    .form-box { background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .info { background: #f0f4ff; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    select, input[type="date"] { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 28px; background: #4472C4; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    button:hover { background: #2c5fa8; }
    a { color: #4472C4; }
  </style>
</head>
<body>
  <h1>授業記録編集</h1>
  <div class="form-box">
    <div class="info">
      <strong>【{{ record.subject }}】{{ record.textbook }} {{ record.problem_number }}</strong>
    </div>
    <form method="POST">
      <label>日付</label>
      <input type="date" name="date" value="{{ record.date }}" required>
      <label>正誤</label>
      <select name="correct">
        <option value="1" {% if record.correct %}selected{% endif %}>正答</option>
        <option value="0" {% if not record.correct %}selected{% endif %}>誤答</option>
      </select>
      <button type="submit">更新する</button>
    </form>
  </div>
  <p><a href="/record/list">← 授業記録一覧に戻る</a></p>
</body>
</html>
