<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <title>Add Record — Study Planner</title>
  <style>
    :root {
      --bg:#0c0d11; --surface:#13151e; --surface2:#1b1e2b;
      --border:#252838; --border-light:#2f3347;
      --text:#dde1ec; --text-muted:#9aa3b8; --text-dim:#555d7a;
      --blue:#5b8ff9; --green:#3ecf8e; --amber:#f5a623; --rose:#f06292; --red:#ef4444;
      --blue-bg:rgba(91,143,249,0.10); --green-bg:rgba(62,207,142,0.10);
      --amber-bg:rgba(245,166,35,0.10); --rose-bg:rgba(240,98,146,0.10);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Noto Serif JP',serif; background:var(--bg); color:var(--text);
      min-height:100vh; padding:40px 32px 80px; -webkit-font-smoothing:antialiased; }
    body::after { content:''; position:fixed; inset:0;
      background-image: linear-gradient(var(--border) 1px,transparent 1px),
        linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size:48px 48px; opacity:0.15; pointer-events:none; z-index:0; }
    .container { max-width:800px; margin:0 auto; position:relative; z-index:1; }
    .page-header { display:flex; align-items:flex-end; justify-content:space-between;
      margin-bottom:32px; padding-bottom:18px; border-bottom:1px solid var(--border-light); }
    .page-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2.5px;
      text-transform:uppercase; color:var(--text-dim); margin-bottom:4px; }
    .page-title { font-family:'DM Mono',monospace; font-weight:500; font-size:18px; color:#f5a623;
      letter-spacing:2px; text-transform:uppercase;  }
    .page-title-ja { font-family:'Noto Serif JP',serif; font-weight:300; font-size:11px;
      color:var(--text-muted); margin-top:4px; }
    .page-header-back { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-muted);
      letter-spacing:1.5px; text-decoration:none; transition:color 0.15s; }
    .page-header-back::before { content:'← '; }
    .page-header-back:hover { color:var(--text); }
    .card { background:var(--surface); border:1px solid var(--border); padding:28px 32px; margin-bottom:20px; }
    .card-title { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px;
      text-transform:uppercase; color:var(--text-muted); margin-bottom:20px;
      padding-bottom:10px; border-bottom:1px solid var(--border); }
    label { display:block; font-family:'DM Mono',monospace; font-size:10px;
      letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted);
      margin-bottom:6px; margin-top:18px; }
    label:first-child { margin-top:0; }
    input[type="text"], input[type="date"], select {
      width:100%; padding:10px 14px; background:var(--surface2);
      border:1px solid var(--border-light); color:var(--text);
      font-family:'Noto Serif JP',serif; font-size:13px; outline:none;
      transition:border-color 0.15s; }
    input:focus, select:focus { border-color:var(--blue); }
    select option { background:var(--surface2); }
    select option.divider { color:var(--text-dim); font-size:11px; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    /* 5段階スコア選択 */
    .score-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-top:8px; }
    .score-btn {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:12px 8px; background:var(--surface2); border:1px solid var(--border-light);
      cursor:pointer; transition:all 0.15s; user-select:none;
    }
    .score-btn:hover { border-color:var(--text-muted); background:var(--surface); }
    .score-btn.selected { border-color:currentColor; }
    .score-btn[data-score="5"].selected { background:rgba(62,207,142,0.12); border-color:var(--green); color:var(--green); }
    .score-btn[data-score="4"].selected { background:rgba(91,143,249,0.12); border-color:var(--blue);  color:var(--blue); }
    .score-btn[data-score="3"].selected { background:rgba(245,166,35,0.12); border-color:var(--amber); color:var(--amber); }
    .score-btn[data-score="2"].selected { background:rgba(240,98,146,0.12); border-color:var(--rose);  color:var(--rose); }
    .score-btn[data-score="1"].selected { background:rgba(239,68,68,0.12);  border-color:var(--red);   color:var(--red); }
    .score-num { font-family:'DM Mono',monospace; font-size:22px; font-weight:500; line-height:1; }
    .score-label { font-family:'Noto Serif JP',serif; font-size:10px; font-weight:300;
      color:var(--text-muted); margin-top:6px; text-align:center; line-height:1.3; }
    .score-btn.selected .score-label { color:inherit; }
    input[type="hidden"]#score-input { display:none; }
    /* 送信ボタン */
    .btn { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:2px;
      text-transform:uppercase; padding:12px 28px; border:none; cursor:pointer;
      transition:all 0.15s; display:inline-flex; align-items:center; gap:8px; }
    .btn-primary { background:var(--blue); color:#0c0d11; }
    .btn-primary:hover { background:#7aaafb; }
    .btn-primary:disabled { background:var(--surface2); color:var(--text-dim); cursor:not-allowed; }
    /* アラート */
    .alert { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1px;
      padding:12px 18px; margin-bottom:20px; border-left:2px solid; }
    .alert-success { background:var(--green-bg); color:var(--green); border-color:var(--green); }
    .alert-error   { background:rgba(239,68,68,0.08); color:#f87171; border-color:var(--red); }
    .fade-in { animation:fadeIn 0.3s ease both; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }
    /* 今期の問題を示すグループ */
    optgroup { font-family:'DM Mono',monospace; font-size:11px; }
  </style>
</head>
<body>
<div class="container">

  <div class="page-header fade-in">
    <div>
      <div class="page-label">04 / Records</div>
      <div class="page-title">Add Record</div>
      <div class="page-title-ja">Add Record</div>
    </div>
    <a class="page-header-back" href="/">TOP</a>
  </div>

  {%- with messages = get_flashed_messages(with_categories=true) %}
  {%- for cat, msg in messages %}
  <div class="alert alert-{{ 'success' if cat == 'success' else 'error' }} fade-in">
    {{ msg }}
  </div>
  {%- endfor %}
  {%- endwith %}

  <div class="card fade-in">
    <div class="card-title">Record Entry</div>
    <form method="POST" action="/record" id="record-form">
      <input type="hidden" name="score" id="score-input" value="5">

      <div class="grid-2">
        <div>
          <label>Student</label>
          <select name="student_id" id="student-select" onchange="onStudentChange()">
            {%- for s in students %}
            <option value="{{ s.student_id }}">{{ s.name }}</option>
            {%- endfor %}
          </select>
        </div>
        <div>
          <label>Date</label>
          <input type="date" name="record_date" id="record-date" value="{{ today }}"
                 onchange="filterProblems()">
        </div>
      </div>

      <label>Textbook</label>
      <select id="textbook-select" onchange="filterProblems()">
        <option value="">— All Textbooks —</option>
      </select>

      <label>Problem</label>
      <select name="problem_id" id="problem-select" size="1">
      </select>

      <!-- 未定問題トグル -->
      <div id="undecided-toggle" style="display:none;margin-top:6px;">
        <button type="button" onclick="toggleUndecided()" id="undecided-btn"
          style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;
            text-transform:uppercase;color:var(--text-dim);background:none;border:none;
            cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:6px;">
          <span id="undecided-arrow">▶</span>
          <span id="undecided-label"></span>
        </button>
      </div>
      <div id="undecided-info" style="display:none;font-family:'DM Mono',monospace;
        font-size:9px;color:var(--text-dim);margin-top:3px;letter-spacing:0.5px;">
        Problems with undecided dates. Select to record.
      </div>

      <label style="margin-top:24px;">Score</label>
      <div class="score-grid">
        <div class="score-btn selected" data-score="5" onclick="selectScore(5)">
          <span class="score-num">5</span>
          <span class="score-label">Perfect</span>
        </div>
        <div class="score-btn" data-score="4" onclick="selectScore(4)">
          <span class="score-num">4</span>
          <span class="score-label">Good</span>
        </div>
        <div class="score-btn" data-score="3" onclick="selectScore(3)">
          <span class="score-num">3</span>
          <span class="score-label">Recall</span>
        </div>
        <div class="score-btn" data-score="2" onclick="selectScore(2)">
          <span class="score-num">2</span>
          <span class="score-label">Retry</span>
        </div>
        <div class="score-btn" data-score="1" onclick="selectScore(1)">
          <span class="score-num">1</span>
          <span class="score-label">Failed</span>
        </div>
      </div>

      <div style="margin-top:28px;">
        <button type="submit" class="btn btn-primary" id="submit-btn">
          Register Record →
        </button>
      </div>
    </form>
  </div>

</div>

<script>
let _allAssignments = [];
let _showUndecided = false;

async function onStudentChange() {
  const sid = document.getElementById('student-select').value;
  const res = await fetch('/get_assignments?student_id=' + sid);
  _allAssignments = await res.json();
  populateTextbooks();
  filterProblems();
}

function populateTextbooks() {
  const seen = new Map(); // textbook -> subject
  _allAssignments.forEach(a => {
    if (!seen.has(a.textbook)) seen.set(a.textbook, a.subject);
  });
  const sel = document.getElementById('textbook-select');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— All Textbooks —</option>';
  seen.forEach((subject, textbook) => {
    const opt = document.createElement('option');
    opt.value = textbook;
    opt.textContent = '[' + subject + '] ' + textbook;
    sel.appendChild(opt);
  });
  // 前回選択を保持（テキストがまだあれば）
  if (prev && [...seen.keys()].includes(prev)) sel.value = prev;
}

function filterProblems() {
  const textbook   = document.getElementById('textbook-select').value;
  const recordDate = document.getElementById('record-date').value;
  const sel        = document.getElementById('problem-select');

  let items = _allAssignments;
  if (textbook) items = items.filter(a => a.textbook === textbook);

  // 今日以前（due）: scheduled_date <= record_date かつ '2099-12-31' でない
  const due = items.filter(a =>
    a.scheduled_date !== '2099-12-31' && a.scheduled_date <= recordDate
  );
  // 未定: scheduled_date == '2099-12-31'
  const undecided = items.filter(a => a.scheduled_date === '2099-12-31');

  // ── メインリスト（due問題）を描画 ──
  sel.innerHTML = '';

  if (due.length === 0) {
    const ph = document.createElement('option');
    ph.value = ''; ph.disabled = true;
    ph.textContent = '— No due problems for this date —';
    sel.appendChild(ph);
  } else {
    due.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.problem_id;
      const base = textbook
        ? a.problem_number
        : '[' + a.subject + '] ' + a.textbook + ' ' + a.problem_number;
      opt.textContent = '[' + (a.category || '') + '] ' + base + '  (' + a.scheduled_date + ')';
      sel.appendChild(opt);
    });
  }

  // ── 未定トグル ──
  const toggleDiv = document.getElementById('undecided-toggle');
  const infoDiv   = document.getElementById('undecided-info');
  if (undecided.length > 0) {
    toggleDiv.style.display = 'block';
    document.getElementById('undecided-label').textContent =
      undecided.length + ' undecided problem' + (undecided.length > 1 ? 's' : '');
    document.getElementById('undecided-arrow').textContent = _showUndecided ? '▼' : '▶';
    infoDiv.style.display = _showUndecided ? 'block' : 'none';

    if (_showUndecided) {
      const sep = document.createElement('option');
      sep.disabled = true;
      sep.textContent = '── Undecided ──────────────────';
      sel.appendChild(sep);
      undecided.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.problem_id;
        const base = textbook
          ? a.problem_number
          : '[' + a.subject + '] ' + a.textbook + ' ' + a.problem_number;
        opt.textContent = '[' + (a.category || '') + '] ' + base + '  (Undecided)';
        sel.appendChild(opt);
      });
    }
  } else {
    toggleDiv.style.display = 'none';
    infoDiv.style.display   = 'none';
  }
}

function toggleUndecided() {
  _showUndecided = !_showUndecided;
  filterProblems();
}

function selectScore(score) {
  document.querySelectorAll('.score-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.score) === score);
  });
  document.getElementById('score-input').value = score;
}

// 初期化
document.addEventListener('DOMContentLoaded', onStudentChange);
</script>
</body>
</html>
