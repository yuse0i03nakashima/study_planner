<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B8FF9"/>
      <stop offset="100%" stop-color="#3ECF8E"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="32" height="32" fill="#0C0D11"/>

  <!-- 外枠 -->
  <rect x="1.5" y="1.5" width="29" height="29" fill="none"
        stroke="#2F3347" stroke-width="0.8"/>

  <!-- 左上コーナー -->
  <path d="M1.5 8 L1.5 1.5 L8 1.5"
        fill="none" stroke="#5B8FF9" stroke-width="2" stroke-linecap="square"/>

  <!-- 右下コーナー -->
  <path d="M30.5 24 L30.5 30.5 L24 30.5"
        fill="none" stroke="#3ECF8E" stroke-width="2" stroke-linecap="square"/>

  <!-- SP テキスト（大きく・くっきり） -->
  <text x="16" y="21" font-family="monospace" font-size="15"
        font-weight="700" fill="#DDE1EC" text-anchor="middle"
        letter-spacing="-0.8">SP</text>

  <!-- アンダーライン -->
  <rect x="7" y="23" width="18" height="1.5" fill="url(#g1)" rx="0.5"/>

  <!-- 右下ドット -->
  <circle cx="29" cy="29" r="1.2" fill="#3ECF8E"/>
</svg>